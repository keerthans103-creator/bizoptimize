server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bizoptimize}
    username: ${DB_USER:bizoptimize}
    password: ${DB_PASSWORD:bizoptimize}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-before-any-real-deployment-0123456789}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.bizoptimize: INFO
