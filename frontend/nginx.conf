server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hashed asset filenames change every build, so these are safe to cache
    # aggressively -- only index.html (above) needs to always be revalidated.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
